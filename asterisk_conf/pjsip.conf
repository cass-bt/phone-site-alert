[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

;==============================================================
; Ramal 1000 — o softphone (Linphone/Zoiper) que vai TOCAR
;   Usuário: 1000   Senha: ChangeMe_1000
;==============================================================
[1000]
type=endpoint
context=from-internal
disallow=all
allow=ulaw
allow=alaw
allow=gsm
auth=1000-auth
aors=1000
direct_media=no
rewrite_contact=yes
force_rport=yes
rtp_symmetric=yes
from_user=1000

[1000-auth]
type=auth
auth_type=userpass
username=1000
password=ChangeMe_1000

[1000]
type=aor
max_contacts=1
remove_existing=yes
