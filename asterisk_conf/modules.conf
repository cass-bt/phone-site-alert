[modules]
autoload=yes

; --- PJSIP (telefonia) ---
load => res_pjsip.so
load => res_pjsip_authenticator_digest.so
load => res_pjsip_endpoint_identifier_user.so
load => chan_pjsip.so

; --- ARI / HTTP (originar chamadas via REST) ---
load => res_http_websocket.so
load => res_ari.so
load => res_ari_model.so
load => res_ari_channels.so
load => res_stasis.so

; --- formatos de áudio (toca os alertas) ---
load => format_wav.so
load => format_pcm.so      ; ulaw/alaw/sln
load => format_gsm.so

; desabilita o canal SIP legado (usamos PJSIP)
noload => chan_sip.so
