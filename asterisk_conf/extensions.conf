[general]
static=yes
writeprotect=no

[from-internal]
; Liga para o softphone 1000
exten => 1000,1,Dial(PJSIP/1000,20)
 same => n,Hangup()

; Teste de áudio: ligue para 999 e ouça o alerta gravado
exten => 999,1,Answer()
 same => n,Wait(1)
 same => n,Playback(custom/site-down)
 same => n,Hangup()

;==============================================================
; Contexto chamado pelo ARI quando o Zabbix dispara o alerta.
; O Asterisk atende, espera 1s (pro áudio não cortar) e toca o
; aviso de "site fora do ar". Repete 2x pra garantir que ouçam.
;==============================================================
[site-alert]
exten => alert,1,Answer()
 same => n,Wait(1)
 same => n,Playback(custom/site-down)
 same => n,Wait(1)
 same => n,Playback(custom/site-down)
 same => n,Hangup()

; Mensagem de recuperação (opcional — quando o site volta)
exten => recovery,1,Answer()
 same => n,Wait(1)
 same => n,Playback(custom/recovery)
 same => n,Hangup()
